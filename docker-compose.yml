services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rana}
      POSTGRES_USER: ${POSTGRES_USER:-rana}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rana-local-only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - rana_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./services/api
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-rana}:${POSTGRES_PASSWORD:-rana-local-only}@postgres:5432/${POSTGRES_DB:-rana}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET to at least 32 random characters}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5175,http://localhost:5176}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  rana_postgres_data:
